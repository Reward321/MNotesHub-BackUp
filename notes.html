}</style><script>const quizData = [
    {
        question: "What is SI unit of force?",
        options: ["Newton", "Joule", "Pascal", "Watt"],
        correct: 0
    },
    {
        question: "Speed of light is?",
        options: ["3×10^8 m/s", "1.5×10^8 m/s", "3×10^6 m/s", "None"],
        correct: 0
    },
    {
        question: "Ohm's law is?",
        options: ["V=IR", "P=VI", "F=ma", "E=mc²"],
        correct: 0
    }
];

const quizBox = document.getElementById("quizBox");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");

let currentIndex = 0;
let score = 0;
let answered = false;

// Load questions
function loadQuiz() {
    quizBox.innerHTML = "";

    quizData.forEach((q, index) => {
        const card = document.createElement("div");
        card.classList.add("question-card");

        let optionsHTML = "";
        q.options.forEach((opt, i) => {
            optionsHTML += `<div class="option" onclick="selectAnswer(this, ${index}, ${i})">${opt}</div>`;
        });

        card.innerHTML = `
            <h3>${q.question}</h3>
            ${optionsHTML}
        `;

        quizBox.appendChild(card);
    });

    updateProgress();
}

function selectAnswer(element, qIndex, optionIndex) {
    if (answered) return;
    answered = true;

    const options = element.parentElement.querySelectorAll(".option");

    options.forEach((opt, i) => {
        if (i === quizData[qIndex].correct) {
            opt.classList.add("correct");
        }
        if (i === optionIndex && i !== quizData[qIndex].correct) {
            opt.classList.add("wrong");
        }
    });

    if (optionIndex === quizData[qIndex].correct) {
        score++;
    }

    setTimeout(() => {
        nextQuestion();
    }, 800);
}

function nextQuestion() {
    answered = false;
    currentIndex++;

    if (currentIndex < quizData.length) {
        quizBox.style.transform = `translateX(-${currentIndex * 100}%)`;
        updateProgress();
    } else {
        showResult();
    }
}

function updateProgress() {
    progressText.innerText = `Question ${currentIndex + 1}/${quizData.length}`;
    progressFill.style.width = ((currentIndex) / quizData.length) * 100 + "%";
}

function showResult() {
    quizBox.innerHTML = `
        <div class="question-card result-box">
            <h2>🎉 Quiz Completed</h2>
            <p>Your Score: ${score} / ${quizData.length}</p>
            <button onclick="restartQuiz()">Restart</button>
        </div>
    `;
    progressText.innerText = "Completed";
    progressFill.style.width = "100%";
}

function restartQuiz() {
    currentIndex = 0;
    score = 0;
    answered = false;
    quizBox.style.transform = `translateX(0%)`;
    loadQuiz();
}

loadQuiz();</script>
